title: GymLedger
description: The logbook serious lifters keep in their pocket. Log every lift, own every gain.
url: https://gymledger.app
permalink: pretty

author:
  name: Rohit Saluja
  email: rohitabhishek2025@gmail.com

exclude:
  - README.md
  - .claude
  - .agents
  - Gemfile
  - Gemfile.lock
  - vendor
  - .bundle
  - node_modules

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
